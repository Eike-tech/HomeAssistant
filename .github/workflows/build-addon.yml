name: Build Dashboard Add-on

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/eike-tech/homeassistant-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' dashboard/config.yaml | sed 's/version: *"\?\([^"]*\)"\?/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.addon
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_BASE }}-${{ matrix.arch }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
